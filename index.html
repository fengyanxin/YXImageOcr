<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片文字识别 - OCR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .card-body {
            padding: 1.5rem;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            color: var(--text-secondary);
        }

        .upload-text {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .url-input-group input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .image-preview {
            margin-top: 1rem;
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 8px;
            max-height: 400px;
            object-fit: contain;
        }

        .image-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .progress-container {
            margin-top: 1rem;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .result-textarea {
            width: 100%;
            min-height: 400px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.8;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .result-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .result-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .result-actions .btn {
            flex: 1;
            justify-content: center;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
        }

        .language-select {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            border-color: var(--primary);
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .init-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #fef3c7;
            color: #92400e;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>图片文字识别</h1>
            <p class="subtitle">上传图片或输入网络图片地址，快速提取文字 <span id="initStatus" class="init-badge">初始化中...</span></p>
        </header>

        <div class="main-grid">
            <div class="card">
                <div class="card-header">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    图片输入
                </div>
                <div class="card-body">
                    <div class="language-select">
                        <button class="lang-btn active" data-lang="chi_sim">简体中文</button>
                        <button class="lang-btn" data-lang="eng">English</button>
                        <button class="lang-btn" data-lang="chi_tra">繁體中文</button>
                        <button class="lang-btn" data-lang="jpn">日本語</button>
                    </div>

                    <div class="upload-area" id="uploadArea">
                        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <p class="upload-text">点击或拖拽图片到这里</p>
                        <p class="upload-hint">支持 PNG、JPG、JPEG、BMP、WebP 格式</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" hidden>

                    <div class="url-input-group">
                        <input type="text" id="urlInput" placeholder="或输入网络图片地址...">
                        <button class="btn btn-secondary" id="loadUrlBtn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            加载
                        </button>
                    </div>

                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="预览">
                        <div class="image-actions">
                            <button class="btn btn-primary" id="recognizeBtn" style="flex:1">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                开始识别
                            </button>
                            <button class="btn btn-secondary" id="clearBtn">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                                清除
                            </button>
                        </div>
                    </div>

                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p class="progress-text" id="progressText">正在初始化...</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    识别结果
                </div>
                <div class="card-body">
                    <div id="resultEmpty" class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p>上传图片后点击识别按钮</p>
                    </div>
                    <textarea class="result-textarea" id="resultTextarea" placeholder="识别结果将显示在这里..."></textarea>
                    <div class="stats" id="resultStats" style="display: none;">
                        <div class="stat-item">
                            <div class="stat-value" id="charCount">0</div>
                            <div class="stat-label">字符数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="wordCount">0</div>
                            <div class="stat-label">词数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="lineCount">0</div>
                            <div class="stat-label">行数</div>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button class="btn btn-primary" id="copyBtn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                            复制
                        </button>
                        <button class="btn btn-primary" id="saveBtn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                            保存
                        </button>
                        <button class="btn btn-secondary" id="clearResultBtn">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                            清空
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Tesseract.js 纯前端 OCR
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const urlInput = document.getElementById('urlInput');
        const loadUrlBtn = document.getElementById('loadUrlBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const recognizeBtn = document.getElementById('recognizeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultTextarea = document.getElementById('resultTextarea');
        const resultEmpty = document.getElementById('resultEmpty');
        const resultStats = document.getElementById('resultStats');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const lineCount = document.getElementById('lineCount');
        const copyBtn = document.getElementById('copyBtn');
        const saveBtn = document.getElementById('saveBtn');
        const clearResultBtn = document.getElementById('clearResultBtn');
        const toast = document.getElementById('toast');
        const langBtns = document.querySelectorAll('.lang-btn');
        const initStatus = document.getElementById('initStatus');

        let currentImage = null;
        let selectedLang = 'chi_sim';
        let worker = null;
        let isInitialized = false;

        // 初始化 Tesseract Worker
        async function initWorker() {
            if (isInitialized) return;
            try {
                console.log('开始初始化 Tesseract worker...');
                // PSM 3: 自动分页模式，适合多种文本布局
                // PSM 6: 单列文本块
                worker = await Tesseract.createWorker(selectedLang, 1, {
                    tessedit_pageseg_mode: '3',  // 自动分页（更准确）
                    preserve_interword_spaces: '1',  // 保留词间空格
                });
                isInitialized = true;
                initStatus.textContent = '就绪';
                initStatus.style.background = '#d1fae5';
                initStatus.style.color = '#065f46';
                console.log('Tesseract worker 初始化完成');
            } catch (error) {
                console.error('初始化失败:', error);
                initStatus.textContent = '初始化失败';
                initStatus.style.background = '#fee2e2';
                initStatus.style.color = '#991b1b';
            }
        }

        // 切换语言时重新初始化
        async function switchLanguage(lang) {
            try {
                if (worker) {
                    await worker.terminate();
                }
                isInitialized = false;
                initStatus.textContent = '加载语言包...';
                initStatus.style.background = '#fef3c7';
                initStatus.style.color = '#92400e';
                console.log('切换语言到:', lang);
                worker = await Tesseract.createWorker(lang, 1, {
                    tessedit_pageseg_mode: '3',  // 自动分页
                    preserve_interword_spaces: '1',
                });
                isInitialized = true;
                initStatus.textContent = '就绪';
                initStatus.style.background = '#d1fae5';
                initStatus.style.color = '#065f46';
                console.log('语言切换完成');
            } catch (error) {
                console.error('语言切换失败:', error);
                initStatus.textContent = '加载失败';
            }
        }

        // 页面加载时初始化
        initWorker();

        langBtns.forEach(btn => {
            btn.addEventListener('click', async () => {
                if (btn.classList.contains('active')) return;
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedLang = btn.dataset.lang;
                await switchLanguage(selectedLang);
            });
        });

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                previewImg.src = currentImage;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        loadUrlBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                showToast('请输入图片地址', 'error');
                return;
            }

            currentImage = url;
            previewImg.src = url;
            previewImg.onload = () => {
                imagePreview.classList.add('active');
                showToast('图片加载成功', 'success');
            };
            previewImg.onerror = () => {
                showToast('图片加载失败，请检查地址', 'error');
                currentImage = null;
            };
        });

        clearBtn.addEventListener('click', () => {
            currentImage = null;
            previewImg.src = '';
            imagePreview.classList.remove('active');
            fileInput.value = '';
            urlInput.value = '';
        });

        // ==================== 图像预处理函数 ====================

        // 图像预处理 - 提高识别准确率
        async function preprocessImage(imageSrc) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    let width = img.width;
                    let height = img.height;

                    // 如果图片太大，缩放（提高速度和准确率）
                    const maxSize = 3000;
                    if (width > maxSize || height > maxSize) {
                        const scale = maxSize / Math.max(width, height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }

                    // 如果图片太小，放大
                    const minSize = 800;
                    if (width < minSize || height < minSize) {
                        const scale = minSize / Math.min(width, height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }

                    canvas.width = width;
                    canvas.height = height;

                    // 绘制原始图片
                    ctx.drawImage(img, 0, 0, width, height);

                    // 获取图像数据
                    let imageData = ctx.getImageData(0, 0, width, height);
                    let data = imageData.data;

                    // 转换为灰度图
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = Math.round(0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }

                    // 增强对比度
                    const contrast = 30; // 对比度值
                    const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                    for (let i = 0; i < data.length; i += 4) {
                        let gray = data[i];
                        gray = factor * (gray - 128) + 128;
                        gray = Math.max(0, Math.min(255, gray));
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }

                    // 二值化处理（提高文字清晰度）
                    const threshold = 140;
                    for (let i = 0; i < data.length; i += 4) {
                        let gray = data[i];
                        const binary = gray >= threshold ? 255 : 0;
                        data[i] = binary;
                        data[i + 1] = binary;
                        data[i + 2] = binary;
                    }

                    ctx.putImageData(imageData, 0, 0);

                    // 转换为 base64
                    const processedSrc = canvas.toDataURL('image/png');
                    resolve(processedSrc);
                };
                img.onerror = () => {
                    resolve(imageSrc); // 失败则返回原图
                };
                img.src = imageSrc;
            });
        }

        let isRecognizing = false;

        recognizeBtn.addEventListener('click', async () => {
            if (!currentImage) {
                showToast('请先上传图片', 'error');
                return;
            }

            // 检查 worker 是否已初始化
            if (!worker || !isInitialized) {
                showToast('OCR 引擎未就绪，请等待初始化完成', 'error');
                console.log('Worker 状态:', { worker: !!worker, isInitialized });
                return;
            }

            if (isRecognizing) return;
            isRecognizing = true;
            recognizeBtn.disabled = true;
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = '正在识别...';

            // 模拟进度动画
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 500);

            try {
                console.log('开始识别图片...');

                // 自动使用最佳设置：多模式 + 图像增强
                const psmModes = ['3', '6', '12', '13'];  // 自动、单列、稀疏文本、单行
                const results = [];

                // 先对图像进行增强
                progressText.textContent = '图像增强中...';
                const enhancedImage = await preprocessImage(currentImage);
                console.log('图像预处理完成');

                // 尝试多种 PSM 模式，选择最佳结果
                for (const psm of psmModes) {
                    progressText.textContent = `识别中... (${psmModes.indexOf(psm) + 1}/${psmModes.length})`;
                    console.log(`尝试 PSM ${psm}...`);

                    await worker.setParameters({
                        tessedit_pageseg_mode: psm
                    });

                    const result = await worker.recognize(enhancedImage);
                    const text = result.data.text.trim();
                    results.push({ psm, text, length: text.length });

                    console.log(`PSM ${psm}: ${text.length} 字符`);
                }

                // 选择结果最长的（通常最准确）
                results.sort((a, b) => b.length - a.length);
                const best = results[0];

                clearInterval(progressInterval);
                resultTextarea.value = best.text;
                resultTextarea.dispatchEvent(new Event('input'));
                progressText.textContent = '识别完成！';
                progressFill.style.width = '100%';

                setTimeout(() => {
                    progressContainer.classList.remove('active');
                }, 1000);

                updateStats();
                showToast(`识别成功！使用模式 PSM-${best.psm}，识别到 ${best.length} 个字符`, 'success');

            } catch (error) {
                clearInterval(progressInterval);
                console.error('识别失败，详细错误:', error);
                showToast('识别失败: ' + error.message, 'error');
                progressContainer.classList.remove('active');
            }

            isRecognizing = false;
            recognizeBtn.disabled = false;
        });

        resultTextarea.addEventListener('input', updateStats);

        function updateStats() {
            const text = resultTextarea.value;
            if (!text.trim()) {
                resultStats.style.display = 'none';
                resultEmpty.style.display = 'block';
                return;
            }
            resultEmpty.style.display = 'none';
            resultStats.style.display = 'flex';

            charCount.textContent = text.length;
            wordCount.textContent = text.split(/\s+/).filter(w => w).length;
            lineCount.textContent = text.split('\n').length;
        }

        copyBtn.addEventListener('click', () => {
            const text = resultTextarea.value;
            if (!text) {
                showToast('没有内容可复制', 'error');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            });
        });

        saveBtn.addEventListener('click', () => {
            const text = resultTextarea.value;
            if (!text) {
                showToast('没有内容可保存', 'error');
                return;
            }
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ocr-result-' + Date.now() + '.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存', 'success');
        });

        clearResultBtn.addEventListener('click', () => {
            resultTextarea.value = '';
            updateStats();
        });

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast show' + (type === 'success' ? ' success' : '');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
